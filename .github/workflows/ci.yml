name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run docs:spellcheck
      - run: node --check apps/server/server.js
      - run: node --check apps/web/src/app.js
      - run: npm test
      - run: npm run verify:publication
      - run: npm run seed:demo
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run docs:spellcheck
      - run: node --check apps/server/server.js
      - run: node --check apps/web/src/app.js
      - run: npm test
      - run: npm run verify:publication
      - run: npm run seed:demo
