name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use vX.Y.Z format. Got $tag"
          }
          if ($tag -ne "v$version") {
            throw "Release tag $tag does not match package.json version v$version"
          }

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: node --check apps/server/server.js
      - run: node --check apps/web/src/app.js
      - run: node --check apps/desktop/main.js
      - run: npm test

      - name: Verify publication safety
        shell: pwsh
        run: ./scripts/verify-publication.ps1

      - run: npm run desktop:dist:win

      - name: Create stable-name installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem local/artifacts/desktop -Filter '*-x64.exe' | Select-Object -First 1
          if (-not $exe) { throw "No installer exe found" }
          Copy-Item $exe.FullName "local/artifacts/desktop/ValorGrid-Setup-x64.exe"
          Write-Host "Created stable installer: $($exe.Name) -> ValorGrid-Setup-x64.exe"

      - run: npm run release:checksums

      - run: node scripts/generate-release-notes.js

      - name: Attest installer
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            local/artifacts/desktop/ValorGrid-Setup-x64.exe
            local/artifacts/desktop/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            local/artifacts/desktop/ValorGrid-Setup-x64.exe
            local/artifacts/desktop/*.exe
            local/artifacts/desktop/*.blockmap
            local/artifacts/desktop/latest.yml
            local/artifacts/desktop/SHA256SUMS.txt
