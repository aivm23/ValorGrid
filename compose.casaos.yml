name: valorgrid

services:
  valorgrid:
    image: ghcr.io/aivm23/valorgrid:v3.2.0
    container_name: valorgrid
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      PORTFOLIO_DB_PATH: /data/portfolio.sqlite
    ports:
      - "5173:5173"
    volumes:
      - /DATA/AppData/valorgrid/data:/data
      - /DATA/AppData/valorgrid/backups:/app/.backups
    x-casaos:
      envs:
        - container: HOST
          description:
            en_US: Host interface used by the web server.
            es_ES: Interfaz de host usada por el servidor web.
        - container: PORT
          description:
            en_US: Web server listening port.
            es_ES: Puerto de escucha del servidor web.
        - container: PORTFOLIO_DB_PATH
          description:
            en_US: SQLite database file path inside the container.
            es_ES: Ruta del archivo SQLite dentro del contenedor.
      ports:
        - container: "5173"
          description:
            en_US: ValorGrid Web UI HTTP port.
            es_ES: Puerto HTTP de la interfaz web de ValorGrid.
      volumes:
        - container: /data
          description:
            en_US: Persistent SQLite data directory.
            es_ES: Directorio persistente de datos SQLite.
        - container: /app/.backups
          description:
            en_US: Persistent backup directory.
            es_ES: Directorio persistente de copias de seguridad.

x-casaos:
  architectures:
    - amd64
    - arm64
  main: valorgrid
  author: alvarovalderramamolina
  developer: alvarovalderramamolina
  category: Finance
  version: "v3.2.0"
  updateAt: "2026-06-02"
  website: https://github.com/aivm23/ValorGrid
  support: https://github.com/aivm23/ValorGrid/issues
  repo: https://github.com/aivm23/ValorGrid
  icon: https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/brand/valorgrid-logo.png
  screenshot_link:
    - https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/screenshots/dashboard-demo.png
    - https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/screenshots/distribucion-demo.png
    - https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/screenshots/historico-demo.png
    - https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/screenshots/movimientos-demo.png
    - https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/screenshots/valores-grupos-demo.png
  port_map: "5173"
  scheme: http
  index: /
  title:
    en_US: ValorGrid
    es_ES: ValorGrid
  tagline:
    en_US: Private local portfolio dashboard
    es_ES: Panel privado de cartera local
  description:
    en_US: ValorGrid is a private, single-user portfolio dashboard with SQLite persistence, local backups and market-price cache.
    es_ES: ValorGrid es un panel privado de cartera para un solo usuario con persistencia SQLite, backups locales y cache de precios de mercado.
