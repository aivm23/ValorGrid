name: valorgrid

services:
  valorgrid:
    image: ghcr.io/aivm23/valorgrid:latest
    container_name: valorgrid
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      PORTFOLIO_DB_PATH: /data/portfolio.sqlite
    ports:
      - "5173:5173"
    volumes:
      - valorgrid-data:/data
      - valorgrid-backups:/app/.backups

volumes:
  valorgrid-data:
    driver: local
  valorgrid-backups:
    driver: local

x-casaos:
  architectures:
    - amd64
    - arm64
  main: valorgrid
  author: alvarovalderramamolina
  developer: alvarovalderramamolina
  category: Finance
  icon: https://raw.githubusercontent.com/aivm23/ValorGrid/main/assets/brand/valorgrid-logo.png
  port_map: "5173"
  scheme: http
  index: /
  title:
    en_us: ValorGrid
    es_es: ValorGrid
  tagline:
    en_us: Private local portfolio dashboard
    es_es: Panel privado de cartera local
  description:
    en_us: ValorGrid is a private, single-user portfolio dashboard with SQLite persistence, local backups and market-price cache.
    es_es: ValorGrid es un panel privado de cartera para un solo usuario con persistencia SQLite, backups locales y caché de precios de mercado.
