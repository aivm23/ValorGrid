services:
  valorgrid:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: valorgrid:local
    container_name: valorgrid
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 1325
      VALORGRID_RUNTIME_MODE: docker
      PORTFOLIO_DB_PATH: /data/portfolio.sqlite
      VALORGRID_BACKUP_DIR: /app/.backups
      VALORGRID_AUTH_USER: valorgrid
      VALORGRID_AUTH_PASSWORD: ''
      VALORGRID_ALPHA_VANTAGE_API_KEY: ''
    ports:
      - '1325:1325'
    volumes:
      - ../../local/valorgrid/data:/data
      - ../../local/valorgrid/backups:/app/.backups
